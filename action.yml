name: "React Doctor"
description: "Scan React codebases for security, performance, and correctness issues"
branding:
  icon: "activity"
  color: "blue"

inputs:
  directory:
    description: "Project directory to scan"
    default: "."
  verbose:
    description: "Show file details per rule"
    default: "true"
  project:
    description: "Workspace project(s) to scan (comma-separated)"
    required: false
  diff:
    description: "Base branch for diff mode (e.g. main). Only files changed vs this branch are scanned."
    required: false
  github-token:
    description: "GitHub token for posting PR comments. When set on pull_request events, findings are posted as a PR comment."
    required: false
  fail-on:
    description: "Exit non-zero when diagnostics fire (error, warning, none). Gates on individual diagnostics in the scanned files, not on the score. Combine with `diff` for regression-only gating, or read the `score` output in a follow-up step to enforce an absolute score floor."
    default: "error"
  offline:
    description: "Skip sending diagnostics to the react.doctor API and calculate score locally"
    default: "false"
  annotations:
    description: "Emit diagnostics as GitHub Actions annotations so findings show inline in the PR's Files changed view. Combine with `github-token` for both annotations and a sticky comment."
    default: "false"
  baseline:
    description: "Enable baseline mode - diagnostics matching the baseline file are excluded from CI / PR comments. Pass a path to override the default (react-doctor-baseline.json)."
    required: false
  touched-lines:
    description: "Only count diagnostics on lines actually touched by the diff (requires `diff` to also be set). Defaults to false."
    default: "false"
  concurrency:
    description: "Max workspace projects to scan in parallel (monorepos). Defaults to 1."
    default: "1"
  node-version:
    description: "Node.js version to use"
    default: "22"

outputs:
  score:
    description: "Health score (0-100)"
    value: ${{ steps.score.outputs.score }}

runs:
  using: "composite"
  steps:
    - uses: actions/setup-node@v4
      with:
        node-version: ${{ inputs.node-version }}

    - if: ${{ inputs.diff != '' && github.event_name == 'pull_request' }}
      shell: bash
      run: |
        case "$DIFF_BASE" in -* ) echo "::error::diff input cannot start with -"; exit 1 ;; esac
        case "$HEAD_REF" in -* ) echo "::error::head_ref cannot start with -"; exit 1 ;; esac
        git fetch origin "$DIFF_BASE" && git branch -f "$DIFF_BASE" FETCH_HEAD 2>/dev/null || true
        git checkout "$HEAD_REF" 2>/dev/null || true
      env:
        GITHUB_TOKEN: ${{ inputs.github-token }}
        DIFF_BASE: ${{ inputs.diff }}
        HEAD_REF: ${{ github.head_ref }}

    - shell: bash
      env:
        NO_COLOR: "1"
        INPUT_DIRECTORY: ${{ inputs.directory }}
        INPUT_VERBOSE: ${{ inputs.verbose }}
        INPUT_PROJECT: ${{ inputs.project }}
        INPUT_DIFF: ${{ inputs.diff }}
        INPUT_GITHUB_TOKEN: ${{ inputs.github-token }}
        INPUT_FAIL_ON: ${{ inputs.fail-on }}
        INPUT_OFFLINE: ${{ inputs.offline }}
        INPUT_ANNOTATIONS: ${{ inputs.annotations }}
        INPUT_BASELINE: ${{ inputs.baseline }}
        INPUT_TOUCHED_LINES: ${{ inputs.touched-lines }}
        INPUT_CONCURRENCY: ${{ inputs.concurrency }}
        RUNNER_TEMP: ${{ runner.temp }}
        GITHUB_RUN_ID: ${{ github.run_id }}
      run: |
        FLAGS=("--fail-on" "$INPUT_FAIL_ON")
        if [ "$INPUT_VERBOSE" = "true" ]; then FLAGS+=("--verbose"); fi
        if [ -n "$INPUT_PROJECT" ]; then FLAGS+=("--project" "$INPUT_PROJECT"); fi
        if [ -n "$INPUT_DIFF" ]; then FLAGS+=("--diff" "$INPUT_DIFF"); fi
        if [ "$INPUT_OFFLINE" = "true" ]; then FLAGS+=("--offline"); fi
        if [ "$INPUT_ANNOTATIONS" = "true" ]; then FLAGS+=("--annotations"); fi
        if [ "$INPUT_TOUCHED_LINES" = "true" ]; then FLAGS+=("--touched-lines"); fi
        if [ -n "$INPUT_CONCURRENCY" ] && [ "$INPUT_CONCURRENCY" != "1" ]; then
          FLAGS+=("--concurrency" "$INPUT_CONCURRENCY")
        fi
        # Baseline accepts an optional path or a `true`/`false` toggle.
        case "$INPUT_BASELINE" in
          ""|"false") : ;;
          "true") FLAGS+=("--baseline") ;;
          *) FLAGS+=("--baseline" "$INPUT_BASELINE") ;;
        esac

        OUTPUT_FILE="${RUNNER_TEMP:-/tmp}/react-doctor-output-${GITHUB_RUN_ID:-$$}.txt"
        MARKDOWN_FILE="${RUNNER_TEMP:-/tmp}/react-doctor-comment-${GITHUB_RUN_ID:-$$}.md"
        echo "REACT_DOCTOR_OUTPUT_FILE=$OUTPUT_FILE" >> "$GITHUB_ENV"
        echo "REACT_DOCTOR_MARKDOWN_FILE=$MARKDOWN_FILE" >> "$GITHUB_ENV"

        if [ -n "$INPUT_GITHUB_TOKEN" ]; then
          # Single scan, two outputs:
          # - stdout: human-readable diagnostics for the build log
          #   (piped through a sed that strips GitHub `::error`/`::warning`
          #   workflow commands; the runner still parses those from the
          #   live step log).
          # - $MARKDOWN_FILE: structured sticky-comment markdown written
          #   as a side effect via `--pr-comment-output`.
          # `set +e`/PIPESTATUS preserves the scan's exit code through the
          # `| tee` pipeline so a failing scan still fails the composite
          # action - while letting the sticky-comment markdown land first.
          RAW_FILE="${RUNNER_TEMP:-/tmp}/react-doctor-raw-${GITHUB_RUN_ID:-$$}.txt"
          set +e
          npx react-doctor@latest "$INPUT_DIRECTORY" "${FLAGS[@]}" \
            --pr-comment --pr-comment-output "$MARKDOWN_FILE" | tee "$RAW_FILE"
          PIPELINE_EXIT_CODES=("${PIPESTATUS[@]}")
          set -e
          sed -E '/^::(error|warning) /d' "$RAW_FILE" > "$OUTPUT_FILE"
          if [ "${PIPELINE_EXIT_CODES[1]}" -ne 0 ]; then exit "${PIPELINE_EXIT_CODES[1]}"; fi
          exit "${PIPELINE_EXIT_CODES[0]}"
        else
          npx react-doctor@latest "$INPUT_DIRECTORY" "${FLAGS[@]}"
        fi

    - id: score
      if: always()
      shell: bash
      env:
        INPUT_DIRECTORY: ${{ inputs.directory }}
        INPUT_OFFLINE: ${{ inputs.offline }}
      run: |
        # HACK: --score is an output-collection step, not a gate. Force
        # --fail-on none so older react-doctor releases (which exit
        # non-zero when the score lands in the "Needs work" band, even
        # though the value itself is the only meaningful signal here)
        # don't fail the composite action under `set -e -o pipefail`.
        SCORE_ARGS=("$INPUT_DIRECTORY" "--score" "--fail-on" "none")
        if [ "$INPUT_OFFLINE" = "true" ]; then SCORE_ARGS+=("--offline"); fi
        SCORE=$(npx react-doctor@latest "${SCORE_ARGS[@]}" 2>/dev/null | tail -1 | tr -d '[:space:]') || true
        if [[ -n "$SCORE" && "$SCORE" =~ ^[0-9]+$ ]]; then
          echo "score=$SCORE" >> "$GITHUB_OUTPUT"
        fi

    - if: ${{ inputs.github-token != '' && github.event_name == 'pull_request' }}
      uses: actions/github-script@v7
      env:
        REACT_DOCTOR_OUTPUT_FILE: ${{ env.REACT_DOCTOR_OUTPUT_FILE }}
        REACT_DOCTOR_MARKDOWN_FILE: ${{ env.REACT_DOCTOR_MARKDOWN_FILE }}
        REACT_DOCTOR_SCORE: ${{ steps.score.outputs.score }}
      with:
        github-token: ${{ inputs.github-token }}
        script: |
          const fs = require("fs");
          const marker = "<!-- react-doctor -->";

          // Prefer the CLI's first-class sticky-comment markdown when
          // it produced a non-empty document - it ships per-rule
          // <details>, per-package summaries, baseline framing, and
          // suppression snippets straight out of the CLI. Fall back to
          // the legacy plaintext-in-fence layout when the markdown
          // capture wasn't generated (older react-doctor versions).
          const markdownPath = process.env.REACT_DOCTOR_MARKDOWN_FILE;
          let body = null;
          if (markdownPath && fs.existsSync(markdownPath)) {
            const markdown = fs.readFileSync(markdownPath, "utf8").trim();
            if (markdown.startsWith(marker)) body = markdown;
          }
          if (!body) {
            const outputPath = process.env.REACT_DOCTOR_OUTPUT_FILE;
            if (!outputPath || !fs.existsSync(outputPath)) return;
            const output = fs.readFileSync(outputPath, "utf8").trim();
            if (!output) return;

            const score = process.env.REACT_DOCTOR_SCORE;
            const scoreLine =
              score && /^[0-9]+$/.test(score)
                ? `**Score:** \`${score}\` / 100\n\n`
                : "";

            const fence = "````";
            body = `${marker}\n## React Doctor\n\n${scoreLine}${fence}\n${output}\n${fence}`;
          }

          const { data: comments } = await github.rest.issues.listComments({
            ...context.repo,
            issue_number: context.issue.number,
          });
          const prev = comments.find((c) => c.body?.startsWith(marker));
          if (prev) {
            await github.rest.issues.updateComment({
              ...context.repo,
              comment_id: prev.id,
              body,
            });
          } else {
            await github.rest.issues.createComment({
              ...context.repo,
              issue_number: context.issue.number,
              body,
            });
          }
